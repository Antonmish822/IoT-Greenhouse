<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Теплица на даче — Умная теплица</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="container">
    <!-- Левая часть: приветствие -->
    <div class="hero">
      <h1>Умная теплица</h1>
      <p>Автоматическое проветривание, контроль климата и удалённое управление — всё в одном приложении.</p>
    </div>

    <!-- Правая часть: формы -->
    <div class="form-section">
      <div class="tabs">
        <div class="tab active" data-tab="login">Вход</div>
        <div class="tab" data-tab="register">Регистрация</div>
      </div>

      <!-- Форма входа -->
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Электронная почта</label>
          <input type="email" id="login-email" name="email" required />
        </div>
        <div class="form-group">
          <label for="login-password">Пароль</label>
          <input type="password" id="login-password" name="password" required />
        </div>
        <button type="submit" class="btn">Войти</button>
      </form>

      <!-- Форма регистрации (скрыта по умолчанию) -->
      <form id="register-form" style="display: none;">
        <div class="form-group">
          <label for="reg-name">Имя</label>
          <input type="text" id="reg-name" name="name" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Электронная почта</label>
          <input type="email" id="reg-email" name="email" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Пароль</label>
          <input type="password" id="reg-password" name="password" required minlength="6" />
        </div>
        <div class="form-group">
          <label for="reg-confirm">Подтвердите пароль</label>
          <input type="password" id="reg-confirm" name="confirm" required minlength="6" />
        </div>
        <button type="submit" class="btn">Зарегистрироваться</button>
      </form>

      <div class="form-footer">
        <p>Нет аккаунта? <a href="#" id="show-register">Создать</a></p>
        <p>Забыли пароль? <a href="#">Восстановить</a></p>
      </div>
    </div>
  </div>

  <!-- Простой JS для переключения форм (опционально) -->
  <script>
    document.getElementById('show-register').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('register-form').style.display = 'block';
    });

    // Альтернатива: через табы
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        if (tab.dataset.tab === 'login') {
          document.getElementById('login-form').style.display = 'block';
          document.getElementById('register-form').style.display = 'none';
        } else {
          document.getElementById('login-form').style.display = 'none';
          document.getElementById('register-form').style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
