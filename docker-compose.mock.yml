services:
  mock-sender:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./mock:/app/mock
    command: >
      /bin/bash -c "set -euo pipefail && DEBIAN_FRONTEND=noninteractive apt-get update -y >/tmp/apt.log && DEBIAN_FRONTEND=noninteractive apt-get install -y curl >/tmp/apt.log && bash /app/mock/send_telemetry.sh"
    restart: unless-stopped
