version: '3.9'

services:
  mock-sender:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./mock:/app/mock:ro
    command: >
      /bin/bash -c "set -euo pipefail && apt-get update -y >/tmp/apt.log && apt-get install -y curl >/tmp/apt.log && chmod +x /app/mock/send_telemetry.sh && /app/mock/send_telemetry.sh"
    restart: unless-stopped
