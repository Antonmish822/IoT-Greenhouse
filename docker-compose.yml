version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    ports:
      - "8002:8001"
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - frontend/.env
    ports:
      - "8000:8010"
    depends_on:
      - backend
    command: >
      /bin/sh -c "python manage.py migrate --no-input && python manage.py runserver 0.0.0.0:8010"
    restart: unless-stopped

volumes:
  backend_data:
