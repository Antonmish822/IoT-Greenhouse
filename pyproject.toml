[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'
exclude = '''/(
    \.git
  | \.venv
  | \.mypy_cache
  | \.pytest_cache
  | \.vscode
  | build
  | dist
  | docs
  | frontend
)/'''

[tool.flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = .git,__pycache__,.venv,build,dist,docs,frontend